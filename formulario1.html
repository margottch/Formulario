<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPW-207 | Lab 1.3 y 1.4 - Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <header class="mb-5 text-center">
            <h1 class="display-5 fw-bold">Registro de Estudiantes ITPM</h1>
            <p class="text-muted">Laboratorio: Sección 1.3 (Formularios) y 1.4 (Utilidades)</p>
        </header>

        <main class="row justify-content-center">
            <div class="col-md-8 bg-white p-4 shadow-sm rounded">

                <form id="registroForm" class="needs-validation" novalidate>

                    <!--  1:  autocomplete="name" -->
                    <div class="mb-4">
                        <label for="nombre" class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" autocomplete="name"
                            placeholder="Ej: Juan Perez" required minlength="3">
                        <div class="invalid-feedback">Por favor, ingresa un nombre válido (mín. 3 caracteres).</div>
                    </div>

                    <!--  2:  autocomplete="email" y name="email"
                         -->
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold">Correo Institucional</label>
                        <input type="email" class="form-control" id="email" name="email" autocomplete="email"
                            placeholder="usuario@itpm.edu.bo" required>
                        <div class="invalid-feedback">Ingresa un formato de correo electrónico correcto.</div>
                    </div>

                    <!--3:  pattern del teléfono y se agregó name + autocomplete -->
                    <div class="mb-4">
                        <label for="telefono" class="form-label fw-bold">Teléfono de Contacto</label>
                        <input type="tel" class="form-control" id="telefono" name="telefono" autocomplete="tel"
                            pattern="^[67][0-9]{7}$" placeholder="76543210" required>
                        <div class="invalid-feedback">
                            <!--4: Faltaba el mensaje de error
                                 Si el usuario ponía un número incorrecto, no veía ningún mensaje de error. -->
                            Ingresa un número válido: 8 dígitos comenzando en 6 o 7.
                        </div>
                        <small class="text-muted">Formato: 8 dígitos iniciando en 6 o 7.</small>
                    </div>

                    <hr class="my-4">

                    <!--5: Se agregó aria-label, los lectores de pantalla no describen bien el botón. -->
                    <button class="btn btn-primary w-100 py-2" type="submit" aria-label="Enviar formulario de registro">
                        Enviar Registro
                    </button>

                </form>
            </div>
        </main>
    </div>

    <script>
        (() => {
            'use strict'

            const forms = document.querySelectorAll('.needs-validation')

            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {

                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    // 6: El código JS estaba bien pero le faltaba feedback visual al usuario.
                    // ¿Por qué? Se agrega un alert solo cuando el formulario SÍ es válido,
              
                    else {
                        event.preventDefault() 
                        alert('✅ ¡Registro enviado correctamente!')
                        form.reset()
                        form.classList.remove('was-validated')
                    }

                    form.classList.add('was-validated')

                }, false)
            })
        })()
    </script>

</body>

</html>
